<div id="bib-splash" aria-hidden="true">
  <img src="assets/logo/logo.png" alt="" class="splash-logo" />
  <div class="splash-bar"><span></span></div>
</div>
<script>
(function () {
  var s = document.getElementById('bib-splash');
  if (!s) return;
  var reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  var seen = false;
  try { seen = !!sessionStorage.getItem('bib-splash-seen'); } catch (e) {}
  if (seen || reduce) { s.parentNode.removeChild(s); return; }
  document.documentElement.classList.add('splash-lock');
  var finished = false;
  function done() {
    if (finished) return;
    finished = true;
    s.classList.add('is-done');
    try { sessionStorage.setItem('bib-splash-seen', '1'); } catch (e) {}
    setTimeout(function () {
      if (s.parentNode) s.parentNode.removeChild(s);
      document.documentElement.classList.remove('splash-lock');
    }, 1000);
  }
  var minDelay = new Promise(function (r) { setTimeout(r, 2100); });
  var loaded = new Promise(function (r) {
    if (document.readyState === 'complete') r();
    else window.addEventListener('load', r);
  });
  Promise.all([minDelay, loaded]).then(done);
  setTimeout(done, 6000);
})();
</script>

<script src="js/enhancements.js"></script>
<script>
// Modal management
function initModal() {
  const trigger = document.getElementById('plateau-preview-trigger');
  const modal = document.getElementById('plateau-modal');
  const closeBtn = document.getElementById('plateau-modal-close');
  const boardWrap = modal ? modal.querySelector('.board-wrap') : null;
  const arrowExpress = modal ? modal.querySelector('.arrow-express') : null;
  const arrowLongue = modal ? modal.querySelector('.arrow-longue') : null;

  function playRoute(cls) {
    if (!boardWrap) return;
    boardWrap.classList.remove(cls);
    void boardWrap.offsetWidth; // force reflow to restart animation
    boardWrap.classList.add(cls);
    setTimeout(() => boardWrap.classList.remove(cls), 3200);
  }
  if (arrowExpress) arrowExpress.addEventListener('click', () => playRoute('playing-express'));
  if (arrowLongue) arrowLongue.addEventListener('click', () => playRoute('playing-longue'));

  if (!trigger || !modal) return;
  
  // Open modal on trigger click
  trigger.addEventListener('click', () => {
    modal.classList.remove('hidden');
  });
  
  // Close modal on close button click
  closeBtn.addEventListener('click', () => {
    modal.classList.add('hidden');
  });
  
  // Close modal on backdrop click (outside the modal content)
  modal.addEventListener('click', (e) => {
    if (e.target === modal) {
      modal.classList.add('hidden');
    }
  });
}

// Force pieces marquee initialization after DOM is ready
window.addEventListener('load', () => {
  initModal();
  initMobileMenu();
  setTimeout(() => {
    const root = document.getElementById('pieces-scroll');
    const track = root?.querySelector('.pieces-track');
    
    if (track && !track.classList.contains('animated')) {
      console.log('FORCING pieces marquee init...');
      
      // Verify and clone items if needed
      const originalItems = Array.from(track.querySelectorAll('.piece-card:not(:nth-child(n+7))'));
      if (originalItems.length > 0 && track.children.length < 12) {
        originalItems.forEach((item) => {
          const clone = item.cloneNode(true);
          track.appendChild(clone);
        });
      }
      
      // Force add animated class
      track.classList.add('animated');
      console.log('✓ Applied animated class, items:', track.children.length);
    } else if (track?.classList.contains('animated')) {
      console.log('✓ Pieces marquee already initialized, items:', track.children.length);
    }
  }, 500);
});
</script>
